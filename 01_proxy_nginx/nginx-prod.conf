server {
  listen 80;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /usr/share/nginx/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }

  location /api/ {
    return 404;
  }
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate /pem/fullchain.pem;
  ssl_certificate_key /pem/privkey.pem;

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json text/javascript image/svg+xml application/xml font/woff2;
  gzip_min_length 1000;
  gzip_comp_level 6;

  # Vite 해시 에셋: 1년 캐시 (immutable)
  location /assets/ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # 이미지/폰트: 30일 캐시
  location ~* \.(png|webp|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=2592000";
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
    # index.html은 캐시하지 않음 (항상 최신)
    add_header Cache-Control "no-cache";
  }

  location /api/ {
    return 404;
  }
}
